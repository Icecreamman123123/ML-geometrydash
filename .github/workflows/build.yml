name: Build Geode Mod

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    # 1. Download and extract the official Geode CLI manually
    - name: Download Geode CLI
      run: |
        curl -L https://github.com/geode-sdk/cli/releases/latest/download/geode-cli-v3.7.4-win.zip -o geode-cli.zip
        expand-archive geode-cli.zip -destinationpath .
        echo "${{ github.workspace }}" >> $GITHUB_PATH

    # 2. Force install the real SDK and binaries into the local profile directory
    - name: Setup Geode SDK
      run: |
        ./geode.exe sdk install
        ./geode.exe sdk install-binaries
        echo "GEODE_SDK=C:\Users\runneradmin\AppData\Local\Geode\sdk" >> $GITHUB_ENV

    # 3. Compile using raw MSBuild (Visual Studio) instead of Ninja
    - name: Compile Mod File
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release -DGEODE_MOD_INCLUDE_FILE="C:\Users\runneradmin\AppData\Local\Geode\sdk\share\geode\cmake\GeodeMod.cmake"
        cmake --build build --config Release

    # 4. Upload the finished .geode file for you to download
    - name: Upload Mod Artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-bot-mod
        path: build/Release/*.geode
