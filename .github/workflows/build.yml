name: Build Geode Mod

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
        - name: Windows
          os: windows-latest

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
    - uses: actions/checkout@v4

    # Force the runner to register the exact folders where Geode lives before compiling
    - name: Inject Geode Environment Paths
      run: |
        echo "GEODE_SDK=C:\Users\runneradmin\AppData\Local\Geode\sdk" >> $GITHUB_ENV
        echo "Geode_DIR=C:\Users\runneradmin\AppData\Local\Geode\sdk" >> $GITHUB_ENV
      shell: bash

    - name: Build Mod
      uses: geode-sdk/build-geode-mod@main
      id: build
