name: Build Geode Mod

on: [push, pull_request]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
        - name: Windows
          os: windows-latest

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Install Geode Binaries
      run: geode sdk install-binaries

    - name: Build Mod
      uses: geode-sdk/build-geode-mod@main
      with:
        sdk: v3.0.0-beta.1
